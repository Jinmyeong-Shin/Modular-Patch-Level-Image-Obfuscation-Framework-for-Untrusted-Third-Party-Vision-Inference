name: vit-imagenet-highres
description: ViT-Large classification on ImageNet at 384x384 resolution

model:
  hf_model_name_or_path: google/vit-large-patch16-384
  task: classification
  num_classes: 1000

obfuscation:
  patch_size: 16
  group_size: 100

embedding_training:
  iterations: 5000
  learning_rate: 0.01
  batch_size: 16

task_training:
  iterations: 1000
  learning_rate: 0.0001
  batch_size: 128

dataset:
  hf_dataset_name_or_path: benjamin-paine/imagenet-1k-256x256
  input_column: image
  label_column: label
  train_split: train
  eval_split: validation

evaluation:
  batch_size: 128

seed: 42
