name: yolos-coco
description: YOLOS object detection on COCO 2017

model:
  hf_model_name_or_path: hustvl/yolos-tiny
  task: object_detection

obfuscation:
  patch_size: 16
  group_size: 100

embedding_training:
  iterations: 1000
  learning_rate: 0.01
  batch_size: 32

task_training:
  iterations: 300
  learning_rate: 0.0001
  batch_size: 32

dataset:
  hf_dataset_name_or_path: detection-datasets/coco
  input_column: image
  label_column: objects
  train_split: train
  eval_split: val

evaluation:
  batch_size: 32
  max_samples: 512

seed: 42
