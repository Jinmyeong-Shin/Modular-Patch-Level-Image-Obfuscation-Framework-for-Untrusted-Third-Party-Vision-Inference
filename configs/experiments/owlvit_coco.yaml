name: owlvit-coco
description: OWL-ViT zero-shot detection on COCO 2017

model:
  hf_model_name_or_path: google/owlvit-base-patch32
  task: zero_shot_object_detection

obfuscation:
  patch_size: 14
  group_size: 100

embedding_training:
  iterations: 5000
  learning_rate: 0.01
  batch_size: 32

dataset:
  hf_dataset_name_or_path: detection-datasets/coco
  input_column: image
  label_column: objects
  train_split: train
  eval_split: val

evaluation:
  batch_size: 32

seed: 42
