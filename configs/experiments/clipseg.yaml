name: clipseg-zero-shot
description: CLIPSeg zero-shot segmentation

model:
  hf_model_name_or_path: CIDAS/clipseg-rd64-refined
  task: zero_shot_segmentation

obfuscation:
  patch_size: 14
  group_size: 100

embedding_training:
  iterations: 5000
  learning_rate: 0.01
  batch_size: 32

dataset:
  hf_dataset_name_or_path: scene_parse_150
  input_column: image
  label_column: annotation
  train_split: train
  eval_split: test

evaluation:
  batch_size: 32

seed: 42
