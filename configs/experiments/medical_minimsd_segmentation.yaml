name: medical-minimsd-segmentation
description: Binary medical image segmentation on MiniMSD using frozen ViT patch tokens

model:
  hf_model_name_or_path: google/vit-base-patch16-224
  task: medical_segmentation

obfuscation:
  patch_size: 14
  group_size: 100

embedding_training:
  iterations: 1000
  learning_rate: 0.01
  batch_size: 32

task_training:
  iterations: 300
  learning_rate: 0.001
  batch_size: 32

dataset:
  hf_dataset_name_or_path: chehablab/MiniMSD
  input_column: image
  label_column: binary_mask
  mask_column: binary_mask
  train_split: 244[:512]
  eval_split: 244[512:768]

evaluation:
  batch_size: 32
  max_samples: 256

seed: 42
