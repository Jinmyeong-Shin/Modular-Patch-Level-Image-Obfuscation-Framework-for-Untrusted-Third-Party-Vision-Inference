name: vit-pathmnist
description: ViT classification on PathMNIST

model:
    hf_model_name_or_path: google/vit-base-patch16-224
    task: classification
    num_classes: 9

obfuscation:
    patch_size: 14
    group_size: 100

embedding_training:
    iterations: 5000
    learning_rate: 0.01
    batch_size: 32

task_training:
    iterations: 1000
    learning_rate: 0.0001
    batch_size: 256

dataset:
    hf_dataset_name_or_path: albertvillanova/medmnist-v2
    subset: pathmnist
    input_column: image
    label_column: label
    train_split: train
    eval_split: test

evaluation:
    batch_size: 256

seed: 42
